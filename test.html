<!DOCTYPE html>
<html>
<head>
    <title>High-Precision Volume Engine</title>
    <style>
        body { font-family: monospace; background: #050505; color: #00ff00; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #111; border: 1px solid #00ff00; padding: 25px; width: 550px; box-shadow: 0 0 20px #00ff0033; }
        .row { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 10px; color: #008800; text-transform: uppercase; margin-bottom: 6px; }
        input, select { background: #000; border: 1px solid #008800; color: #00ff00; padding: 10px; font-family: monospace; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bar-container { height: 25px; width: 100%; background: #000; border: 1px solid #004400; margin-top: 20px; position: relative; }
        #volume_bar { height: 100%; width: 0%; background: #00ff00; box-shadow: 0 0 15px #00ff0066; }
        .output-box { border: 1px solid #008800; padding: 20px; text-align: center; margin-top: 15px; background: #000; }
        #db_readout { font-size: 3rem; font-weight: bold; }
        .viz { height: 220px; width: 100%; border: 1px solid #004400; margin-bottom: 15px; background: #080808; position: relative; }
        svg { height: 100%; width: 100%; overflow: visible; }
        input[type="range"] { appearance: none; width: 100%; background: #002200; height: 12px; margin: 25px 0; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; height: 25px; width: 12px; background: #00ff00; border: 1px solid #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="panel">
    <div class="viz">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <line x1="50" y1="0" x2="50" y2="100" stroke="#003300" stroke-width="0.5" />
            <path id="curve_path" d="" fill="none" stroke="#00ff00" stroke-width="2" />
            <line id="tracker_v" x1="0" y1="0" x2="0" y2="100" stroke="#444" stroke-width="1" stroke-dasharray="2" />
            <circle id="tracker_dot" r="3" fill="#fff" />
            <circle id="pivot_point" r="4" fill="#ff0000" style="display:none;" />
        </svg>
    </div>

    <div class="row">
        <label>Algorithm Selection</label>
        <select id="logic_type">
            <option value="linear">Linear</option>
            <option value="log">Logarithmic (50% = -6.02 dB)</option>
            <option value="s_curve">S-Curve (Steep Middle)</option>
            <option value="inv_sigmoid" selected>Inverse-Sigmoid (Flat Middle)</option>
        </select>
    </div>

    <div class="grid">
        <div class="row"><label>Min dBFS</label><input type="number" id="min_db" value="-138.47"></div>
        <div class="row"><label>Max dBFS Limit</label><input type="number" id="max_db" value="-8.0"></div>
        <div class="row pivot-ui"><label>Pivot Target (dBFS)</label><input type="number" id="pivot_db" value="-40.0"></div>
        <div class="row pivot-ui"><label>Pivot Position (%)</label><input type="number" id="pivot_pos" value="50"></div>
    </div>

    <input type="range" id="slider" min="0" max="100" step="0.0000001" value="50">
    <div class="bar-container"><div id="volume_bar"></div></div>

    <div class="output-box">
        <label>Volume Output</label>
        <div id="db_readout">-- dBFS</div>
    </div>
</div>

<script>
const el = id => document.getElementById(id);

function calculateDb(x) {
    // Input values treated as floats
    const max = parseFloat(el('max_db').value);
    const min = parseFloat(el('min_db').value);
    const pDb = parseFloat(el('pivot_db').value);
    const pPos = parseFloat(el('pivot_pos').value) / 100;
    const mode = el('logic_type').value;
    const val = x / 100;
    
    let result;

    if (mode === 'linear') {
        result = min + (val * (max - min));
    } else if (mode === 'log') {
        // High-precision internal log calculation
        const currentDb = 20 * Math.log10(val || 1e-10); 
        result = Math.max(min, max + currentDb);
    } else {
        const pRatio = (pDb - min) / (max - min);
        const k = 2.5; 
        let ratio;

        if (val <= pPos) {
            const segmentVal = val / pPos;
            const exp = mode === 's_curve' ? k : 1/k;
            ratio = pRatio * Math.pow(segmentVal, exp);
        } else {
            const segmentVal = (val - pPos) / (1 - pPos);
            const exp = mode === 's_curve' ? 1/k : k;
            ratio = pRatio + (1 - pRatio) * Math.pow(segmentVal, exp);
        }
        result = min + (ratio * (max - min));
    }

    // Force 7 digits of precision for internal return
    return parseFloat(result.toFixed(7));
}

function update() {
    const x = parseFloat(el('slider').value);
    const mode = el('logic_type').value;
    const db = calculateDb(x);
    const max = parseFloat(el('max_db').value);
    const min = parseFloat(el('min_db').value);

    // User output rounded to 2 decimal places
    el('db_readout').innerText = db.toFixed(2) + " dBFS";
    el('volume_bar').style.width = Math.max(0, Math.min(100, ((db - min) / (max - min)) * 100)) + "%";

    let d = "M ";
    for (let i = 0; i <= 100; i++) {
        const val = calculateDb(i);
        const y = 100 - (((val - min) / (max - min)) * 100);
        d += `${i},${y} `;
        
        if (Math.abs(i - x) < 0.5) {
            const currentY = 100 - (((db - min) / (max - min)) * 100);
            el('tracker_v').setAttribute('x1', x); el('tracker_v').setAttribute('x2', x);
            el('tracker_dot').setAttribute('cx', x); el('tracker_dot').setAttribute('cy', currentY);
        }
    }
    el('curve_path').setAttribute('d', d);

    const isCustom = (mode === 's_curve' || mode === 'inv_sigmoid');
    document.querySelectorAll('.pivot-ui').forEach(ui => ui.classList.toggle('hidden', !isCustom));
    
    if (isCustom) {
        const pDb = parseFloat(el('pivot_db').value);
        const pPos = parseFloat(el('pivot_pos').value);
        el('pivot_point').style.display = 'block';
        el('pivot_point').setAttribute('cx', pPos);
        el('pivot_point').setAttribute('cy', 100 - (((pDb - min) / (max - min)) * 100));
    } else {
        el('pivot_point').style.display = 'none';
    }
}

['slider', 'min_db', 'max_db', 'pivot_db', 'pivot_pos', 'logic_type'].forEach(id => {
    el(id).addEventListener('input', update);
});
update();
</script>
</body>
</html>
